server:
  port: 8082
spring:
  application:
    name: "AuthenticationName"
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    properties:
      hibernate:
        show_sql: "true"
jwt:
  secret:
    key: ${JWT_SECRET}
